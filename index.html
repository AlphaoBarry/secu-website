<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA Security</title>
    <!-- Tailwind CSS Script for running directly in the browser -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <section class="relative bg-slate-950 py-24 px-6 overflow-hidden min-h-screen grid content-center">
        <!-- Subtle Grid Background -->
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>

        <div class="max-w-6xl mx-auto relative z-10 w-full">
            <div class="inline-flex items-center space-x-2 bg-blue-900/30 border border-blue-500/50 px-3 py-1 rounded-full mb-6">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                <span class="text-blue-200 text-xs font-bold uppercase tracking-widest">SIA Approved Contractor</span>
            </div>

            <h1 class="text-5xl md:text-7xl font-extrabold text-white leading-tight mb-6">
                Elite Protection for <br />
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">
                    High-Stakes Environments
                </span>
            </h1>

            <p class="text-lg text-slate-400 max-w-2xl mb-10 leading-relaxed">
                Providing fully vetted, SIA-licensed security operatives across the UK.
                From corporate concierge to close protection, we safeguard your assets with
                uncompromising standards.
            </p>

            <div class="flex flex-col sm:flex-row gap-4">
                <button class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-md font-bold transition-all shadow-lg shadow-blue-900/20">
                    Request an Operational Audit
                </button>
                <button class="bg-transparent border border-slate-700 hover:border-slate-500 text-white px-8 py-4 rounded-md font-bold transition-all">
                    Our Services
                </button>
            </div>
        </div>
    </section>
</body>
</html>
